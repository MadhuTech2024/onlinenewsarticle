{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="copyright" content="MACode ID, https://macodeid.com/">
    <title>Type Of article</title>

    <!-- Bootstrap and External CSS -->
    <link rel="stylesheet" href="{% static 'css/maicons.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/owl-carousel/css/owl.carousel.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/animate/animate.css' %}">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">

    <!-- Custom CSS -->
    <style>
        /* General Styling */
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("{% static 'img/news_bg.png' %}");
            background-size: cover;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-position: center;
            padding-top: 70px;
        }

        /* Navbar Styling */
        .navbar {
            padding: 12px 0;
            transition: all 0.3s ease-in-out;
            background-color: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(12px);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        }

        .navbar>.container-fluid {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .navbar-brand .text-primary {
            color: #007bff !important;
        }

        .navbar-nav .nav-item {
            margin-left: 5px;
        }

        .navbar-nav .nav-link {
            font-size: 1rem;
            font-weight: 500;
            color: #444;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease-in-out;
        }

        .navbar-nav .nav-link:hover {
            color: #007bff;
            background-color: rgba(0, 123, 255, 0.08);
        }

        .navbar-nav .nav-item.active .nav-link {
            color: #007bff;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #007bff, #00c6ff);
            border: none;
            padding: 8px 22px;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s ease-in-out;
            box-shadow: 0 2px 8px rgba(0, 123, 255, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #0056b3, #0088cc);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.4);
            transform: translateY(-1px);
        }

        /* Content Styling - scoped to main content, NOT navbar */
        .main-content .container {
            margin-top: 30px;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Footer Styling */
        .footer {
            background: #007bff;
            color: white;
            padding: 20px 0;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-light fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <span class="text-primary">Type of </span>Article
                </a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupport"
                    aria-controls="navbarSupport" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupport">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item {% block home_page %}{% endblock %}">
                            <a class="nav-link" href="{% url 'index' %}">Home</a>
                        </li>
                        <li class="nav-item {% block user_login %}{% endblock %}">
                            <a class="nav-link" href="{% url 'UserLogin' %}">User</a>
                        </li>
                        <li class="nav-item {% block admin_login %}{% endblock %}">
                            <a class="nav-link" href="{% url 'AdminLogin' %}">Admin</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-primary ml-lg-3" href="{% url 'UserRegister' %}">Register</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="main-content">


        {% block content %}
        {% endblock %}

    </div> <!-- .main-content -->

    <script src="{% static 'js/jquery-3.5.1.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'vendor/owl-carousel/js/owl.carousel.min.js' %}"></script>
    <script src="{% static 'vendor/wow/wow.min.js' %}"></script>
    <script src="{% static 'js/theme.js' %}"></script>
</body>

</html>
