{% extends 'users/userbase.html' %}
{% block content %}
{% load static %}

<link rel="stylesheet" href="{% static 'css/sample.css' %}"/>

<h2 align="center">Article Classification</h2>

<center>
    <h1>Article</h1>

    {% if output %}
        <h5>Result is <font color="RED">{{ output }}</font></h5>
    {% endif %}

    <form action="{% url 'prediction' %}" class="control-form" method="post">
        {% csrf_token %}
        <table class="sm-table">
            <tr>
                <td>Enter any Text</td>
                <td>
                    <textarea name="tweets" required rows="7" cols="50"></textarea>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <button type="submit" class="btn-primary">Submit</button>
                </td>
            </tr>
        </table>
    </form>
</center>

{% endblock %}
